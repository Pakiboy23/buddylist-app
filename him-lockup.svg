<svg viewBox="0 0 400 300" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="H.I.M.">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@700;400&amp;display=swap');
    </style>

    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1D1916"/>
      <stop offset="100%" stop-color="#13100E"/>
    </linearGradient>

    <!-- Mark bg -->
    <linearGradient id="mark-bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#241F1A"/>
      <stop offset="100%" stop-color="#1A1510"/>
    </linearGradient>

    <filter id="glow-r" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glow-g" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glow-l" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="400" height="300" rx="28" fill="url(#bg-grad)"/>

  <!-- Ambient glows -->
  <circle cx="60" cy="60" r="80" fill="#E8608A" fill-opacity="0.05"/>
  <circle cx="340" cy="240" r="70" fill="#A78BFA" fill-opacity="0.04"/>
  <circle cx="200" cy="300" r="90" fill="#D4963A" fill-opacity="0.03"/>

  <!-- ─── MARK (centered, top half) ──────────────────── -->
  <!-- Mark container: 120x120 centered at x=140 (so 260–140=120, starts at 140) = center x=200 -->
  <rect x="140" y="24" width="120" height="120" rx="26" fill="url(#mark-bg)"/>

  <!-- Mark ambient bleeds -->
  <circle cx="155" cy="40" r="32" fill="#E8608A" fill-opacity="0.07"/>
  <circle cx="245" cy="128" r="28" fill="#D4963A" fill-opacity="0.06"/>

  <!-- Mark: three presence dots at centers 34/60/86 of 120 → offset by mark origin (140,24) -->
  <!-- Rose dot (H) — center x=174, y=84 -->
  <circle cx="174" cy="84" r="16" fill="#E8608A" fill-opacity="0.13" filter="url(#glow-r)"/>
  <circle cx="174" cy="84" r="12" fill="#E8608A"/>

  <!-- Gold dot (I) — center x=200, y=84 -->
  <circle cx="200" cy="84" r="16" fill="#D4963A" fill-opacity="0.13" filter="url(#glow-g)"/>
  <circle cx="200" cy="84" r="12" fill="#D4963A"/>

  <!-- Lavender dot (M) — center x=226, y=84 -->
  <circle cx="226" cy="84" r="16" fill="#A78BFA" fill-opacity="0.13" filter="url(#glow-l)"/>
  <circle cx="226" cy="84" r="12" fill="#A78BFA"/>

  <!-- ─── WORDMARK (centered, lower half) ────────────── -->
  <!-- H — Rose -->
  <text
    x="68" y="224"
    font-family="'Space Grotesk', 'Inter', system-ui, sans-serif"
    font-weight="700" font-size="82"
    fill="#E8608A" letter-spacing="-2">H</text>

  <!-- Rose dot -->
  <circle cx="142" cy="192" r="10" fill="#E8608A" fill-opacity="0.16" filter="url(#glow-r)"/>
  <circle cx="142" cy="192" r="7" fill="#E8608A"/>

  <!-- I — Gold -->
  <text
    x="160" y="224"
    font-family="'Space Grotesk', 'Inter', system-ui, sans-serif"
    font-weight="700" font-size="82"
    fill="#D4963A" letter-spacing="-2">I</text>

  <!-- Gold dot -->
  <circle cx="196" cy="192" r="10" fill="#D4963A" fill-opacity="0.16" filter="url(#glow-g)"/>
  <circle cx="196" cy="192" r="7" fill="#D4963A"/>

  <!-- M — Lavender -->
  <text
    x="214" y="224"
    font-family="'Space Grotesk', 'Inter', system-ui, sans-serif"
    font-weight="700" font-size="82"
    fill="#A78BFA" letter-spacing="-2">M</text>

  <!-- Lavender trailing dot -->
  <circle cx="293" cy="192" r="10" fill="#A78BFA" fill-opacity="0.16" filter="url(#glow-l)"/>
  <circle cx="293" cy="192" r="7" fill="#A78BFA"/>

  <!-- Tagline -->
  <text
    x="200" y="254"
    font-family="'Space Grotesk', 'Inter', system-ui, sans-serif"
    font-weight="400" font-size="11"
    fill="#4A3C35"
    text-anchor="middle"
    letter-spacing="3.5">FRIENDSHIP · FIRST</text>
</svg>
