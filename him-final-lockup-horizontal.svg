<svg viewBox="0 0 480 140" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="H.I.M. horizontal lockup">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@600&amp;display=swap');
    </style>
    <radialGradient id="hl-bg" cx="38%" cy="32%" r="75%">
      <stop offset="0%"   stop-color="#1A1613"/>
      <stop offset="100%" stop-color="#0F0C09"/>
    </radialGradient>
    <filter id="hl-r" x="-70%" y="-70%" width="240%" height="240%">
      <feGaussianBlur stdDeviation="6" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="hl-g" x="-70%" y="-70%" width="240%" height="240%">
      <feGaussianBlur stdDeviation="5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="hl-l" x="-70%" y="-70%" width="240%" height="240%">
      <feGaussianBlur stdDeviation="6" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="480" height="140" rx="22" fill="url(#hl-bg)"/>

  <!-- Mark — left, vertically centered -->
  <!-- Outer orbit -->
  <circle cx="70" cy="70" r="44" fill="none" stroke="rgba(255,255,255,0.055)" stroke-width="1"/>
  <!-- Inner orbit -->
  <circle cx="70" cy="70" r="26" fill="none" stroke="rgba(255,255,255,0.035)" stroke-width="1"/>
  <!-- Center -->
  <circle cx="70" cy="70" r="6"  fill="#F5EDE0" opacity="0.5"/>
  <!-- Rose — outer, upper-right -->
  <circle cx="101" cy="38" r="15" fill="#E8608A" fill-opacity="0.16" filter="url(#hl-r)"/>
  <circle cx="101" cy="38" r="12" fill="#E8608A"/>
  <!-- Gold — inner, lower -->
  <circle cx="64"  cy="96" r="12" fill="#D4963A" fill-opacity="0.16" filter="url(#hl-g)"/>
  <circle cx="64"  cy="96" r="9"  fill="#D4963A"/>
  <!-- Lavender — outer, left -->
  <circle cx="26"  cy="72" r="14" fill="#A78BFA" fill-opacity="0.16" filter="url(#hl-l)"/>
  <circle cx="26"  cy="72" r="11" fill="#A78BFA"/>

  <!-- Divider -->
  <line x1="142" y1="42" x2="142" y2="98" stroke="rgba(255,255,255,0.07)" stroke-width="1"/>

  <!-- Wordmark + tagline — right of divider -->
  <text
    x="166" y="86"
    font-family="'Space Grotesk', sans-serif"
    font-weight="600"
    font-size="64"
    fill="#F5EDE0"
    letter-spacing="-1">him</text>
  <text
    x="167" y="108"
    font-family="'Space Grotesk', sans-serif"
    font-weight="400"
    font-size="11"
    fill="#4A3C35"
    letter-spacing="3.5">FRIENDSHIP · FIRST</text>
</svg>
