<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>H.I.M. — Orbit Final</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --rose: #E8608A;
      --gold: #D4963A;
      --lav:  #A78BFA;
      --dim:  #4A3C35;
      --text: #F5EDE0;
    }
    body {
      background: #080604;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 72px 40px;
      gap: 64px;
      font-family: 'Space Grotesk', sans-serif;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(4, auto);
      gap: 32px;
      align-items: start;
    }

    .col { display: flex; flex-direction: column; align-items: center; gap: 14px; }
    .col-label {
      font-size: 10px; letter-spacing: 3px;
      text-transform: uppercase; color: #2A2218;
    }

    /* ── Card ── */
    .card {
      background: linear-gradient(145deg, #1A1613, #0F0C09);
      border: 1px solid rgba(255,255,255,0.05);
      border-radius: 22px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow: hidden;
    }
    .card::before {
      content: '';
      position: absolute;
      top: -40px; left: -30px;
      width: 160px; height: 160px;
      background: radial-gradient(circle, rgba(232,96,138,0.055) 0%, transparent 70%);
      pointer-events: none;
    }

    .vdiv { width: 1px; background: rgba(255,255,255,0.06); align-self: stretch; }

    /* ── Type ── */
    .him {
      font-family: 'Space Grotesk', sans-serif;
      font-weight: 600;
      color: var(--text);
      letter-spacing: -0.5px;
      line-height: 1;
    }
    .tagline {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 10px;
      font-weight: 400;
      letter-spacing: 3.5px;
      text-transform: uppercase;
      color: var(--dim);
    }

    /* ── Spec strip ── */
    .spec {
      font-size: 11px;
      color: #2A2218;
      letter-spacing: 1px;
      text-align: center;
      line-height: 1.6;
    }
  </style>
</head>
<body>

  <div class="grid">

    <!-- ── App Logo ────────────────────────── -->
    <div class="col">
      <span class="col-label">App Logo</span>
      <div class="card" style="width:110px;height:110px;border-radius:26px;padding:0;">
        <svg viewBox="0 0 110 110" width="110" height="110" xmlns="http://www.w3.org/2000/svg">
          <defs>
            <radialGradient id="mk-bg" cx="38%" cy="32%" r="75%">
              <stop offset="0%" stop-color="#221C17"/>
              <stop offset="100%" stop-color="#0F0C09"/>
            </radialGradient>
            <filter id="mk-r" x="-60%" y="-60%" width="220%" height="220%">
              <feGaussianBlur stdDeviation="3.5" result="b"/>
              <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
            </filter>
            <filter id="mk-g" x="-60%" y="-60%" width="220%" height="220%">
              <feGaussianBlur stdDeviation="3" result="b"/>
              <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
            </filter>
            <filter id="mk-l" x="-60%" y="-60%" width="220%" height="220%">
              <feGaussianBlur stdDeviation="3.5" result="b"/>
              <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
            </filter>
          </defs>
          <rect width="110" height="110" rx="26" fill="url(#mk-bg)"/>
          <!-- Outer orbit -->
          <circle cx="55" cy="55" r="34" fill="none" stroke="rgba(255,255,255,0.055)" stroke-width="1"/>
          <!-- Inner orbit -->
          <circle cx="55" cy="55" r="20" fill="none" stroke="rgba(255,255,255,0.035)" stroke-width="1"/>
          <!-- Center -->
          <circle cx="55" cy="55" r="4.5" fill="#F5EDE0" opacity="0.5"/>
          <!-- Rose — outer, upper-right -->
          <circle cx="79" cy="31" r="11"  fill="#E8608A" fill-opacity="0.16" filter="url(#mk-r)"/>
          <circle cx="79" cy="31" r="8.5" fill="#E8608A"/>
          <!-- Gold — inner, lower -->
          <circle cx="50" cy="75" r="9"   fill="#D4963A" fill-opacity="0.16" filter="url(#mk-g)"/>
          <circle cx="50" cy="75" r="7"   fill="#D4963A"/>
          <!-- Lavender — outer, left -->
          <circle cx="21" cy="57" r="10"  fill="#A78BFA" fill-opacity="0.16" filter="url(#mk-l)"/>
          <circle cx="21" cy="57" r="8"   fill="#A78BFA"/>
        </svg>
      </div>
    </div>

    <!-- ── Wordmark ───────────────────────── -->
    <div class="col">
      <span class="col-label">Wordmark</span>
      <div class="card" style="padding: 32px 48px 26px; gap: 20px;">
        <svg viewBox="0 0 90 90" width="90" height="90" xmlns="http://www.w3.org/2000/svg">
          <defs>
            <filter id="wm-r" x="-60%" y="-60%" width="220%" height="220%">
              <feGaussianBlur stdDeviation="2.8" result="b"/>
              <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
            </filter>
            <filter id="wm-g" x="-60%" y="-60%" width="220%" height="220%">
              <feGaussianBlur stdDeviation="2.4" result="b"/>
              <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
            </filter>
            <filter id="wm-l" x="-60%" y="-60%" width="220%" height="220%">
              <feGaussianBlur stdDeviation="2.8" result="b"/>
              <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
            </filter>
          </defs>
          <!-- Outer orbit -->
          <circle cx="45" cy="45" r="28" fill="none" stroke="rgba(255,255,255,0.055)" stroke-width="1"/>
          <!-- Inner orbit -->
          <circle cx="45" cy="45" r="16" fill="none" stroke="rgba(255,255,255,0.035)" stroke-width="1"/>
          <!-- Center -->
          <circle cx="45" cy="45" r="3.5" fill="#F5EDE0" opacity="0.5"/>
          <!-- Rose — outer, upper-right -->
          <circle cx="65" cy="25" r="9"   fill="#E8608A" fill-opacity="0.16" filter="url(#wm-r)"/>
          <circle cx="65" cy="25" r="7"   fill="#E8608A"/>
          <!-- Gold — inner, lower -->
          <circle cx="41" cy="61" r="7.5" fill="#D4963A" fill-opacity="0.16" filter="url(#wm-g)"/>
          <circle cx="41" cy="61" r="5.5" fill="#D4963A"/>
          <!-- Lavender — outer, left -->
          <circle cx="17" cy="47" r="8.5" fill="#A78BFA" fill-opacity="0.16" filter="url(#wm-l)"/>
          <circle cx="17" cy="47" r="6.5" fill="#A78BFA"/>
        </svg>
        <div style="display:flex;flex-direction:column;align-items:center;gap:7px;">
          <span class="him" style="font-size:44px;">him</span>
          <span class="tagline">friendship · first</span>
        </div>
      </div>
    </div>

    <!-- ── Horizontal Lockup ──────────────── -->
    <div class="col">
      <span class="col-label">Horizontal Lockup</span>
      <div class="card" style="padding: 26px 32px; flex-direction: row; gap: 22px; align-items: center;">
        <svg viewBox="0 0 58 58" width="58" height="58" xmlns="http://www.w3.org/2000/svg">
          <defs>
            <filter id="hl-r" x="-70%" y="-70%" width="240%" height="240%">
              <feGaussianBlur stdDeviation="2.2" result="b"/>
              <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
            </filter>
            <filter id="hl-g" x="-70%" y="-70%" width="240%" height="240%">
              <feGaussianBlur stdDeviation="1.8" result="b"/>
              <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
            </filter>
            <filter id="hl-l" x="-70%" y="-70%" width="240%" height="240%">
              <feGaussianBlur stdDeviation="2.2" result="b"/>
              <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
            </filter>
          </defs>
          <circle cx="29" cy="29" r="18" fill="none" stroke="rgba(255,255,255,0.055)" stroke-width="1"/>
          <circle cx="29" cy="29" r="10" fill="none" stroke="rgba(255,255,255,0.035)" stroke-width="1"/>
          <circle cx="29" cy="29" r="2.5" fill="#F5EDE0" opacity="0.5"/>
          <!-- Rose -->
          <circle cx="42" cy="16" r="6"  fill="#E8608A" fill-opacity="0.16" filter="url(#hl-r)"/>
          <circle cx="42" cy="16" r="4.5" fill="#E8608A"/>
          <!-- Gold -->
          <circle cx="27" cy="47" r="5"  fill="#D4963A" fill-opacity="0.16" filter="url(#hl-g)"/>
          <circle cx="27" cy="47" r="3.8" fill="#D4963A"/>
          <!-- Lavender -->
          <circle cx="11" cy="30" r="5.5" fill="#A78BFA" fill-opacity="0.16" filter="url(#hl-l)"/>
          <circle cx="11" cy="30" r="4.2" fill="#A78BFA"/>
        </svg>
        <div class="vdiv" style="height: 38px;"></div>
        <div style="display:flex;flex-direction:column;align-items:flex-start;gap:5px;">
          <span class="him" style="font-size:32px;">him</span>
          <span class="tagline">friendship · first</span>
        </div>
      </div>
    </div>

    <!-- ── Stacked Lockup ─────────────────── -->
    <div class="col">
      <span class="col-label">Stacked Lockup</span>
      <div class="card" style="padding: 30px 48px 24px; gap: 18px;">
        <svg viewBox="0 0 80 80" width="80" height="80" xmlns="http://www.w3.org/2000/svg">
          <defs>
            <filter id="sl-r" x="-60%" y="-60%" width="220%" height="220%">
              <feGaussianBlur stdDeviation="2.8" result="b"/>
              <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
            </filter>
            <filter id="sl-g" x="-60%" y="-60%" width="220%" height="220%">
              <feGaussianBlur stdDeviation="2.4" result="b"/>
              <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
            </filter>
            <filter id="sl-l" x="-60%" y="-60%" width="220%" height="220%">
              <feGaussianBlur stdDeviation="2.8" result="b"/>
              <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
            </filter>
          </defs>
          <circle cx="40" cy="40" r="25" fill="none" stroke="rgba(255,255,255,0.055)" stroke-width="1"/>
          <circle cx="40" cy="40" r="14" fill="none" stroke="rgba(255,255,255,0.035)" stroke-width="1"/>
          <circle cx="40" cy="40" r="3.2" fill="#F5EDE0" opacity="0.5"/>
          <!-- Rose -->
          <circle cx="58" cy="22" r="8"   fill="#E8608A" fill-opacity="0.16" filter="url(#sl-r)"/>
          <circle cx="58" cy="22" r="6.2" fill="#E8608A"/>
          <!-- Gold -->
          <circle cx="36" cy="65" r="6.5" fill="#D4963A" fill-opacity="0.16" filter="url(#sl-g)"/>
          <circle cx="36" cy="65" r="5"   fill="#D4963A"/>
          <!-- Lavender -->
          <circle cx="15" cy="42" r="7.5" fill="#A78BFA" fill-opacity="0.16" filter="url(#sl-l)"/>
          <circle cx="15" cy="42" r="5.8" fill="#A78BFA"/>
        </svg>
        <span class="him" style="font-size:38px;">him</span>
        <span class="tagline">friendship · first</span>
      </div>
    </div>

  </div>

  <!-- Spec strip -->
  <div class="spec">
    Orbit · different radii · Space Grotesk 600 · him lowercase<br/>
    rose #E8608A · gold #D4963A · lavender #A78BFA · bg #0F0C09
  </div>

</body>
</html>
