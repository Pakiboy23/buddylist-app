name: Android Release Bundle

# Builds a signed Play Store bundle (.aab) on demand and uploads it as a workflow
# artifact. This does NOT publish to Play — download the artifact and upload it in
# the Play Console, or wire a later step to the Play Developer API once trusted.
#
# Required repository secrets (Settings -> Secrets and variables -> Actions):
#   ANDROID_KEYSTORE_BASE64   - base64 of your upload keystore (.jks):
#                               base64 -w0 upload-keystore.jks | pbcopy
#   ANDROID_KEYSTORE_PASSWORD - keystore store password
#   ANDROID_KEY_ALIAS         - signing key alias (e.g. "upload")
#   ANDROID_KEY_PASSWORD      - signing key password
#   VITE_SUPABASE_URL         - production Supabase URL (baked into the web bundle)
#   VITE_SUPABASE_ANON_KEY    - production Supabase anon key
#
# The release fails fast if signing secrets are absent (see android/app/build.gradle).

on:
  workflow_dispatch:
    inputs:
      version_code:
        description: 'versionCode (integer, must exceed the last Play upload). Blank = use build.gradle default.'
        required: false
        type: string
      version_name:
        description: 'versionName (user-facing, e.g. 1.0.1). Blank = use build.gradle default.'
        required: false
        type: string

permissions:
  contents: read

jobs:
  bundle:
    name: build signed .aab
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build web bundle + sync Android
        run: pnpm run android:sync
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}

      - name: Decode upload keystore
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          if [ -z "$ANDROID_KEYSTORE_BASE64" ]; then
            echo "::error::ANDROID_KEYSTORE_BASE64 secret is not set. Cannot sign the release."
            exit 1
          fi
          echo "$ANDROID_KEYSTORE_BASE64" | base64 -d > "$RUNNER_TEMP/upload-keystore.jks"

      - name: Build release bundle (.aab)
        working-directory: android
        env:
          ANDROID_KEYSTORE_PATH: ${{ runner.temp }}/upload-keystore.jks
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
          ANDROID_VERSION_CODE: ${{ inputs.version_code }}
          ANDROID_VERSION_NAME: ${{ inputs.version_name }}
        run: ./gradlew bundleRelease --no-daemon

      - name: Upload .aab artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-release-aab
          path: android/app/build/outputs/bundle/release/app-release.aab
          if-no-files-found: error
          retention-days: 14

      - name: Clean up keystore
        if: always()
        run: rm -f "$RUNNER_TEMP/upload-keystore.jks"
