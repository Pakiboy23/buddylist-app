<svg viewBox="0 0 120 120" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="H.I.M.">
  <defs>
    <!-- Warm dark background gradient, matches app bg -->
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1D1916"/>
      <stop offset="100%" stop-color="#13100E"/>
    </linearGradient>
    <!-- Subtle glow for each dot -->
    <filter id="glow-rose" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="glow-gold" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="glow-lavender" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="120" height="120" rx="26" fill="url(#bg-grad)"/>

  <!-- Subtle rose ambient glow top-left -->
  <circle cx="20" cy="22" r="32" fill="#E8608A" fill-opacity="0.07"/>
  <!-- Subtle gold ambient glow bottom-right -->
  <circle cx="100" cy="98" r="28" fill="#D4963A" fill-opacity="0.06"/>

  <!-- The three presence dots — H · I · M -->
  <!-- Rose dot (H) -->
  <circle cx="34" cy="60" r="13" fill="#E8608A" filter="url(#glow-rose)" fill-opacity="0.15"/>
  <circle cx="34" cy="60" r="10" fill="#E8608A"/>

  <!-- Gold dot (I) -->
  <circle cx="60" cy="60" r="13" fill="#D4963A" filter="url(#glow-gold)" fill-opacity="0.15"/>
  <circle cx="60" cy="60" r="10" fill="#D4963A"/>

  <!-- Lavender dot (M) -->
  <circle cx="86" cy="60" r="13" fill="#A78BFA" filter="url(#glow-lavender)" fill-opacity="0.15"/>
  <circle cx="86" cy="60" r="10" fill="#A78BFA"/>
</svg>
